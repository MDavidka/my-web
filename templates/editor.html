{% extends "layout.html" %}

{% block title %}Editor - {{ path }}{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/theme/monokai.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/python/python.min.js"></script>
<style>
  .CodeMirror {
    height: 100%;
    font-size: 16px;
  }
</style>
{% endblock %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-12rem)] bg-gray-800/50 border border-gray-700 rounded-xl overflow-hidden">
    <!-- Editor Header -->
    <div class="flex items-center justify-between p-3 bg-gray-900/30 border-b border-gray-700">
        <h2 class="text-lg font-semibold text-white">{{ path }}</h2>
        <div class="space-x-2">
            <button class="bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 px-4 rounded-lg transition" onclick="saveFile()">Save</button>
        </div>
    </div>

    <!-- Editor -->
    <div class="flex-1">
        <textarea id="editor">{{ content }}</textarea>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
        lineNumbers: true,
        mode: 'python',
        theme: 'monokai',
        indentUnit: 4
    });

    window.saveFile = function() {
        const content = editor.getValue();
        const path = "{{ path }}";
        const bot_index = "{{ bot_index }}";

        const formData = new FormData();
        formData.append('content', content);
        formData.append('path', path);

        fetch(`/bot/${bot_index}/save`, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('File saved successfully');
            } else {
                alert('Error saving file: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('An unexpected error occurred.');
        });
    }
});
</script>
{% endblock %}
