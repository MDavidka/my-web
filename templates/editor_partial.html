<div class="flex flex-col h-full bg-gray-800/50">
    <!-- Editor Header -->
    <div class="flex items-center justify-between p-3 bg-gray-900/30 border-b border-gray-700">
        <h2 class="text-lg font-semibold text-white">{{ path }}</h2>
        <div class="space-x-2">
            <button class="bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 px-4 rounded-lg transition" onclick="saveFile()">Save</button>
        </div>
    </div>

    <!-- Editor -->
    <div class="flex-1 h-full">
        <textarea id="editor">{{ content }}</textarea>
    </div>
</div>

<style>
  .CodeMirror, .CodeMirror-gutters {
    background-color: #1D1D1D !important;
  }
</style>

<script>
    const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
        lineNumbers: true,
        mode: 'python',
        theme: 'monokai',
        indentUnit: 4
    });

    window.saveFile = function() {
        const content = editor.getValue();
        const path = "{{ path }}";
        const bot_index = "{{ bot_index }}";

        const formData = new FormData();
        formData.append('content', content);
        formData.append('path', path);

        fetch(`/bot/${bot_index}/save`, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // Maybe show a more subtle success message
                alert('File saved successfully');
            } else {
                alert('Error saving file: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('An unexpected error occurred.');
        });
    }
</script>
