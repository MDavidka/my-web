{% extends "layout.html" %}

{% block title %}File Manager{% endblock %}

{% block head %}
<style>
  /* ... (same styles) ... */
</style>
{% endblock %}

{% macro render_tree_item(item, bot_index) %}
    <!-- ... (same macro) ... -->
</li>
{% endmacro %}

{% block content %}
<!-- ... (same main layout) ... -->

<!-- Create Item Modal -->
<div id="create-modal" class="fixed inset-0 z-50 items-center justify-center bg-black/50 backdrop-blur-sm hidden">
    <div class="w-full max-w-md p-6 bg-gray-800 border border-gray-700 rounded-2xl shadow-xl">
        <h3 id="modal-title" class="text-xl font-semibold text-white mb-4">Create New</h3>
        <form id="create-form"
              hx-post="{{ url_for('create_item', bot_index=bot_index) }}"
              hx-target="body"
              hx-swap="beforeend">
            <input type="hidden" name="type" id="modal-item-type">
            <input type="hidden" name="path" id="modal-base-path" value="">
            <div>
                <label for="modal-item-name" class="block text-sm font-medium text-gray-300 mb-1">Name</label>
                <input type="text" name="name" id="modal-item-name" required
                       class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex justify-end space-x-4 mt-6">
                <button type="button" id="modal-cancel-btn" class="px-4 py-2 text-sm font-medium text-gray-300 bg-gray-700 rounded-lg hover:bg-gray-600 transition">Cancel</button>
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-500 transition">Create</button>
            </div>
        </form>
    </div>
</div>

<div id="toast-container" class="fixed bottom-24 right-4 z-50"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // ... (same JS as before) ...

    const createModal = document.getElementById('create-modal');
    const modalTitle = document.getElementById('modal-title');
    const modalItemType = document.getElementById('modal-item-type');
    const modalBasePath = document.getElementById('modal-base-path');
    const modalCancelBtn = document.getElementById('modal-cancel-btn');
    const createForm = document.getElementById('create-form');

    window.showCreateModal = function(type, path = '') {
        modalTitle.textContent = `Create New ${type.charAt(0).toUpperCase() + type.slice(1)}`;
        modalItemType.value = type;
        modalBasePath.value = path;
        createModal.classList.remove('hidden');
        createModal.classList.add('flex');
    }

    function hideCreateModal() {
        createModal.classList.add('hidden');
        createModal.classList.remove('flex');
        createForm.reset();
    }

    modalCancelBtn.addEventListener('click', hideCreateModal);

    // Close modal on escape key
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !createModal.classList.contains('hidden')) {
            hideCreateModal();
        }
    });

    // Handle form submission response
    document.body.addEventListener('htmx:afterOnLoad', function(evt) {
        const xhr = evt.detail.xhr;
        if (xhr.responseURL.includes('/create')) {
            const data = JSON.parse(xhr.responseText);
            showToast(data.message, data.success ? 'success' : 'error');
            if (data.success) {
                hideCreateModal();
                // We should reload the file tree here. For now, we'll just reload the page.
                window.location.reload();
            }
        }
    });

    function showToast(message, type = 'info') {
        const toastContainer = document.getElementById('toast-container');
        const toast = document.createElement('div');
        const bgColor = type === 'success' ? 'bg-green-500' : (type === 'error' ? 'bg-red-500' : 'bg-blue-500');

        toast.className = `px-4 py-3 rounded-lg shadow-lg text-white ${bgColor} animate-pulse`;
        toast.textContent = message;

        toastContainer.appendChild(toast);

        setTimeout(() => {
            toast.remove();
        }, 3000);
    }
});
</script>
{% endblock %}
