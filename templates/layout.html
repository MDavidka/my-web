<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Bot Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              gray: {
                900: '#101010',
                800: '#1D1D1D',
                700: '#2B2B2B',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #101010;
      }
      .frosted-glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-900 text-gray-100 antialiased p-4">

    <header class="frosted-glass rounded-xl mb-4" style="margin: 1rem; border-radius: 0.75rem;">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="{{ url_for('list_bots') if current_user.is_authenticated else url_for('login') }}" class="flex items-center space-x-2 text-lg font-semibold">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                    <span>BotDash</span>
                </a>
                <nav class="hidden md:flex items-center space-x-4">
                    {% if current_user.is_authenticated %}
                        <a href="{{ url_for('api_docs') }}" class="text-gray-400 hover:text-white transition">API Docs</a>
                        <a href="{{ url_for('logout') }}" class="bg-gray-800 hover:bg-gray-700 text-white font-medium py-2 px-4 rounded-lg transition">Logout</a>
                    {% else %}
                        <a href="{{ url_for('login') }}" class="bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 px-4 rounded-lg transition">Login</a>
                    {% endif %}
                </nav>
            </div>
        </div>
    </header>

    <main class="container mx-auto">
        {% block content %}{% endblock %}
    </main>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
