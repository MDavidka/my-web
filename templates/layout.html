<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bot Manager{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body {% block body_attributes %}{% endblock %}>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div id="console-container" class="console-container hidden">
        <div class="console-header" id="console-header-drag-handle">
            <div class="console-dots">
                <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
            </div>
            <span class="console-title">Console</span>
            <div id="console-bot-controls" class="console-bot-controls"></div>
            <div class="console-actions">
                <div id="console-status-display" class="status-badge hidden"></div>
                <button id="console-close-btn" class="btn-icon" title="Close Console"><i data-feather="x"></i></button>
            </div>
        </div>
        <pre id="console-output" class="console-output">Welcome to the console.</pre>
    </div>

    <button id="console-toggle-btn" class="fab" title="Toggle Console">
        <i data-feather="terminal"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script>
        feather.replace();
    </script>
    {% block scripts %}
    <script>
        // --- GLOBAL FLOATING CONSOLE LOGIC ---
        document.addEventListener('DOMContentLoaded', () => {
            const consoleContainer = document.getElementById('console-container');
            const consoleToggleBtn = document.getElementById('console-toggle-btn');
            const consoleCloseBtn = document.getElementById('console-close-btn');
            const consoleHeader = document.getElementById('console-header-drag-handle');
            const consoleOutput = document.getElementById('console-output');
            const consoleStatus = document.getElementById('console-status-display');

            if (!consoleContainer) return; // Exit if console not in DOM

            // --- Visibility ---
            consoleToggleBtn.addEventListener('click', () => {
                consoleContainer.classList.toggle('hidden');
                if (!consoleContainer.classList.contains('hidden')) {
                    startLogPolling(); // Start polling when opened
                }
            });
            consoleCloseBtn.addEventListener('click', () => consoleContainer.classList.add('hidden'));

            // --- Dragging ---
            // (Dragging logic is unchanged)
            let isDragging = false;
            let offsetX, offsetY;
            const onMouseDown = (e) => {
                isDragging = true;
                offsetX = e.clientX - consoleContainer.offsetLeft;
                offsetY = e.clientY - consoleContainer.offsetTop;
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                consoleHeader.style.cursor = 'grabbing';
            };
            const onMouseMove = (e) => {
                if (!isDragging) return;
                const x = Math.min(window.innerWidth - consoleContainer.offsetWidth, Math.max(0, e.clientX - offsetX));
                const y = Math.min(window.innerHeight - consoleContainer.offsetHeight, Math.max(0, e.clientY - offsetY));
                consoleContainer.style.left = `${x}px`;
                consoleContainer.style.top = `${y}px`;
            };
            const onMouseUp = () => {
                isDragging = false;
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                consoleHeader.style.cursor = 'move';
            };
            consoleHeader.addEventListener('mousedown', onMouseDown);

            // --- Bot Controls in Console ---
            function setupConsoleBotControls() {
                const controlsContainer = document.getElementById('console-bot-controls');
                const layout = document.querySelector('[data-user-id][data-bot-index]');
                if (!layout || !controlsContainer) return;

                const userId = layout.dataset.userId;
                const botIndex = layout.dataset.botIndex;
                controlsContainer.innerHTML = ''; // Clear existing buttons

                const startBtn = document.createElement('a');
                startBtn.href = `/bot/${userId}/${botIndex}/start`;
                startBtn.className = 'btn btn-success';
                startBtn.innerHTML = '<i data-feather="play"></i> Start';

                const stopBtn = document.createElement('a');
                stopBtn.href = `/bot/${userId}/${botIndex}/stop`;
                stopBtn.className = 'btn btn-danger';
                stopBtn.innerHTML = '<i data-feather="stop-circle"></i> Stop';

                controlsContainer.appendChild(startBtn);
                controlsContainer.appendChild(stopBtn);
                feather.replace(); // Re-run feather to render new icons
            }
            setupConsoleBotControls();

            // --- Status & Log Polling ---
            let statusPollInterval = null;
            let logPollInterval = null;
            let lastLogSize = 0;

            const updateStatus = async (userId, botIndex) => {
                try {
                    const res = await fetch(`/bot/${userId}/${botIndex}/status`);
                    const data = await res.json();

                    consoleStatus.innerHTML = `Status: <b>${data.status}</b> (${data.ram_usage} MB)`;
                    consoleStatus.classList.remove('running', 'stopped', 'hidden');
                    consoleStatus.classList.add(data.status.toLowerCase());
                } catch (e) {
                    consoleStatus.textContent = 'Status: Error';
                    consoleStatus.classList.remove('hidden');
                }
            };

            const pollLogs = async (userId, botIndex) => {
                const url = `/bot/${userId}/${botIndex}/logs?size=${lastLogSize}`;
                try {
                    const res = await fetch(url);
                    if(res.status === 404) {
                         consoleOutput.textContent += '\\nLog file not found. Run the bot to create it.';
                         clearInterval(logPollInterval);
                         return;
                    }
                    const data = await res.json();
                    if (data.log_data) {
                        if (consoleOutput.textContent === 'Connecting to console...\\n') {
                            consoleOutput.textContent = '';
                        }
                        consoleOutput.textContent += data.log_data;
                        consoleOutput.scrollTop = consoleOutput.scrollHeight;
                    }
                    lastLogSize = data.log_size;
                } catch (e) {
                    console.error("Log poll failed:", e);
                    clearInterval(logPollInterval);
                }
            };

            function startLogPolling() {
                const layout = document.querySelector('[data-user-id][data-bot-index]');
                if (!layout) {
                    consoleOutput.textContent = "Bot controls and console are only available in a bot's file manager.";
                    consoleStatus.classList.add('hidden');
                    return;
                }

                const userId = layout.dataset.userId;
                const botIndex = layout.dataset.botIndex;

                // Clear previous intervals
                if (logPollInterval) clearInterval(logPollInterval);
                if (statusPollInterval) clearInterval(statusPollInterval);

                consoleOutput.textContent = 'Connecting to console...\\n';
                lastLogSize = 0;

                statusPollInterval = setInterval(() => updateStatus(userId, botIndex), 3000);
                logPollInterval = setInterval(() => pollLogs(userId, botIndex), 2500);
                updateStatus(userId, botIndex); // Initial poll
                pollLogs(userId, botIndex); // Initial poll
            }
        });
    </script>
    {% endblock %}
</body>
</html>
